name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create Gradle Wrapper Files
      run: |
        # Create wrapper directory
        mkdir -p gradle/wrapper
        
        # Download gradle-wrapper.jar
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v7.6.4/gradle/wrapper/gradle-wrapper.jar
        
        # Create gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-7.6.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Make gradlew executable
        chmod +x gradlew
        
        echo "✓ Gradle wrapper files created"
        ls -la gradle/wrapper/
    
    - name: Build APK
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FoodTracker-App
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
