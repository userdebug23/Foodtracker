name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Gradle
      run: |
        # Install Gradle
        wget -O gradle.zip https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip gradle.zip
        sudo mv gradle-8.2 /opt/gradle
        sudo ln -s /opt/gradle/bin/gradle /usr/bin/gradle
        
        # Create wrapper
        mkdir -p gradle/wrapper
        cd gradle/wrapper
        curl -O https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        cat > gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF
        cd ../..
        
        # Make gradlew executable
        chmod +x gradlew 2>/dev/null || echo "gradlew not found, using gradle directly"
        
        echo "Gradle setup complete"
        gradle --version
    
    - name: Build APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi
    
    - name: Find APK
      id: find-apk
      run: |
        APK_PATH=$(find app/build/outputs -name "*.apk" | head -1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FoodTracker-APK
        path: ${{ steps.find-apk.outputs.apk_path }}
        if-no-files-found: warn
    
    - name: Build success
      if: success()
      run: echo "✅ Build successful! Download APK from Artifacts."
